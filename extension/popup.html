<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 250px; padding: 15px; font-family: 'Segoe UI', sans-serif; }
    h3 { margin-top: 0; text-align: center; color: #333; }
    
    input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    
    button { 
      width: 100%; padding: 10px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; margin-bottom: 5px;
    }
    .btn-primary { background-color: #007bff; color: white; }
    .btn-primary:hover { background-color: #0056b3; }
    .btn-danger { background-color: #dc3545; color: white; }
    
    #status { margin-top: 10px; font-size: 12px; text-align: center; color: green; }
    .error { color: red !important; }
    
    /* Başlangıçta gizli bölümler */
    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="login-section">
    <h3>Giriş Yap</h3>
    <input type="text" id="username" placeholder="Kullanıcı Adı">
    <input type="password" id="password" placeholder="Şifre">
    <button id="loginBtn" class="btn-primary">Giriş</button>
    <div id="login-msg" style="font-size:12px; color:red;"></div>
  </div>

  <div id="save-section" class="hidden">
    <h3>Web Clipper</h3>
    <p style="text-align:center; font-size:12px;">Hoşgeldin, <span id="display-user" style="font-weight:bold;"></span></p>
    
    <button id="saveBtn" class="btn-primary">Seçili Alanı Kaydet</button>
    <button id="logoutBtn" class="btn-danger">Çıkış Yap</button>
    
    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
